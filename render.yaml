services:
  - type: web
    name: philosopher-server
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: prod
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
